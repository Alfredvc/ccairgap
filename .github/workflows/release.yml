name: Release

on:
  push:
    tags: ["v*"]

# Job order is load-bearing. The npm package, once published, references the
# default image at ghcr.io/alfredvc/ccairgap:<version>(-<hash8>) — first
# launch on a user's machine pulls it. If npm shipped before the image
# existed in GHCR, every fresh install would 404 until the image job caught
# up. Image first, npm last.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      hash8: ${{ steps.hash.outputs.hash8 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify tag matches package.json version
        id: version
        run: |
          pkg=$(node -p "require('./package.json').version")
          tag=${GITHUB_REF_NAME#v}
          if [ "$pkg" != "$tag" ]; then
            echo "::error::Tag v$tag does not match package.json version $pkg"
            exit 1
          fi
          echo "version=$pkg" >> "$GITHUB_OUTPUT"
      - name: Compute Dockerfile+entrypoint hash8 (matches src/image.ts computeTag)
        id: hash
        run: |
          # Mirrors computeTag in src/image.ts: sha256 of Dockerfile then
          # entrypoint.sh content concatenated, first 8 hex chars.
          hash8=$(cat docker/Dockerfile docker/entrypoint.sh | sha256sum | cut -c1-8)
          echo "hash8=$hash8" >> "$GITHUB_OUTPUT"

  publish-image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          # Lowercase repo owner for ghcr (case-sensitive on GitHub, must be
          # lowercase in registry refs).
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$owner/ccairgap" >> "$GITHUB_OUTPUT"
      - name: Probe GHCR for prior release with same Dockerfile+entrypoint hash
        # If a previous release already pushed an image with this exact hash8
        # (i.e. Dockerfile + entrypoint.sh unchanged), reuse that digest by
        # retagging instead of rebuilding+repushing identical layers. Falls
        # through to the build path on any API failure.
        id: probe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          hash8=${{ needs.build.outputs.hash8 }}
          existing=$(gh api --paginate \
            "/users/${{ steps.meta.outputs.owner }}/packages/container/ccairgap/versions" \
            --jq '.[] | .metadata.container.tags[]? | select(endswith("-'"$hash8"'"))' \
            2>/dev/null | head -n1 || true)
          if [ -n "$existing" ]; then
            echo "existing=$existing" >> "$GITHUB_OUTPUT"
            echo "Reusing prior digest from tag: $existing"
          else
            echo "No prior tag with -$hash8 suffix; will build."
          fi
      - name: Retag prior digest (no rebuild)
        if: steps.probe.outputs.existing != ''
        # `imagetools create` writes a new manifest list pointing at the
        # source digest — no layer pull, no layer push. The original
        # attestation, signed against that digest, still resolves under the
        # new tag.
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.image }}:${{ needs.build.outputs.version }}-${{ needs.build.outputs.hash8 }}" \
            --tag "${{ steps.meta.outputs.image }}:${{ needs.build.outputs.version }}" \
            "${{ steps.meta.outputs.image }}:${{ steps.probe.outputs.existing }}"
      - uses: docker/build-push-action@v6
        if: steps.probe.outputs.existing == ''
        id: build-push
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # CLI pulls the version+hash form. Plain :version tag is for humans
          # browsing the registry; both refs point at the same digest.
          tags: |
            ${{ steps.meta.outputs.image }}:${{ needs.build.outputs.version }}-${{ needs.build.outputs.hash8 }}
            ${{ steps.meta.outputs.image }}:${{ needs.build.outputs.version }}
      - uses: actions/attest-build-provenance@v2
        if: steps.probe.outputs.existing == ''
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
      - name: Verify image is anonymously pullable
        # The CLI pulls without auth; if the GHCR package visibility is still
        # private (default for new packages), users hit 401. Fail the release
        # here so the npm publish job never runs against a private image.
        run: |
          # `docker logout` drops the GHCR creds set by docker/login-action so
          # the manifest probe runs anonymously — same posture a fresh user has.
          docker logout ghcr.io
          ref="${{ steps.meta.outputs.image }}:${{ needs.build.outputs.version }}-${{ needs.build.outputs.hash8 }}"
          if ! docker manifest inspect "$ref" >/dev/null; then
            echo "::error::Image $ref is not anonymously pullable. Set the GHCR package visibility to Public:"
            echo "::error::  https://github.com/users/${{ github.repository_owner }}/packages/container/ccairgap/settings"
            exit 1
          fi

  publish-npm:
    needs: publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Extract CHANGELOG section for this tag
        run: |
          version=${GITHUB_REF_NAME#v}
          awk -v ver="$version" '
            /^## \[/ {
              if (p) exit
              if (index($0, "[" ver "]") == 4) { p=1; print; next }
            }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG section found for $version"
            exit 1
          fi
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
